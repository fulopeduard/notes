<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudKeep Pro - Firebase</title>
    <style>
        :root {
            --surface-color: rgba(30, 30, 34, 0.95);
            --card-bg: #d3b212;
            --text-main: #f1f3f4;
            --text-dark: #202124;
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-color: #8ab4f8;
            --danger-color: #f28b82;
            --success-color: #81c995;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(145deg, #0d1117 0%, #161b22 100%);
            background-attachment: fixed;
            margin: 0; color: var(--text-main); min-height: 100vh;
        }

        /* --- Header & Layout --- */
        header {
            background: var(--surface-color); padding: 15px 30px;
            display: flex; align-items: center; justify-content: space-between;
            backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color);
            position: sticky; top: 0; z-index: 100;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }

        /* --- Note Creator --- */
        .note-creator {
            background: var(--surface-color); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 20px; max-width: 550px; margin: 0 auto 30px auto;
        }

        .type-selector { display: flex; gap: 10px; margin-bottom: 15px; }
        .type-btn { 
            background: #3c4043; color: white; padding: 5px 12px; 
            border-radius: 6px; font-size: 12px; opacity: 0.6;
        }
        .type-btn.active { opacity: 1; border: 1px solid var(--accent-color); }

        /* --- Grid & Cards --- */
        .notes-grid { column-count: 3; column-gap: 15px; }
        @media (max-width: 800px) { .notes-grid { column-count: 2; } }
        @media (max-width: 500px) { .notes-grid { column-count: 1; } }

        .note-card {
            background: var(--card-bg); color: var(--text-dark);
            border-radius: 10px; padding: 15px; margin-bottom: 15px;
            break-inside: avoid; cursor: pointer; transition: transform 0.2s;
        }
        .note-card:hover { transform: translateY(-3px); }
        .note-card h3 { margin: 0 0 10px 0; font-size: 1.1rem; }

        /* --- Modal --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; justify-content: center;
            align-items: center; z-index: 1000; backdrop-filter: blur(5px);
        }

        .modal-content {
            background: var(--card-bg); color: var(--text-dark);
            width: 90%; max-width: 700px; max-height: 90vh;
            border-radius: 15px; padding: 25px; overflow-y: auto; position: relative;
        }

        .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .close-modal { font-size: 24px; cursor: pointer; }

        /* --- Editor & Lists --- */
        .rich-editor { min-height: 100px; outline: none; margin-bottom: 15px; line-height: 1.6; }
        .list-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .list-item input[type="text"], .list-item input[type="number"] {
            background: rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.1);
            padding: 5px; border-radius: 4px; color: var(--text-dark);
        }
        .money-total { border-top: 2px solid rgba(0,0,0,0.2); margin-top: 15px; padding-top: 10px; font-weight: bold; font-size: 1.2rem; }

        /* --- History Section --- */
        .history-section {
            margin-top: 30px; padding-top: 15px;
            border-top: 1px dashed rgba(0,0,0,0.2); font-size: 0.8rem;
        }
        .history-item { margin-bottom: 5px; color: #444; }

        /* --- Buttons --- */
        .btn { padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; border: none; }
        .btn-primary { background: #1a73e8; color: white; }
        .btn-save { background: #188038; color: white; margin-top: 10px; }
        .toolbar { display: none; gap: 5px; margin-bottom: 10px; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 10px; }
        
        .edit-mode .toolbar { display: flex; }
        .edit-mode .read-only { display: none; }
        .view-mode .edit-only { display: none; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="auth-container" class="container" style="display: flex; justify-content: center; align-items: center; height: 100vh;">
        <div style="background: var(--surface-color); padding: 40px; border-radius: 15px; text-align: center; border: 1px solid var(--border-color);">
            <h2 style="color: var(--accent-color)">✨ CloudKeep Pro</h2>
            <input type="email" id="email-input" placeholder="Email" style="width:100%; padding:10px; margin-bottom:10px; border-radius:5px; border:none;">
            <input type="password" id="password-input" placeholder="Jelszó" style="width:100%; padding:10px; margin-bottom:20px; border-radius:5px; border:none;">
            <button class="btn btn-primary" id="login-btn" style="width:100%">Bejelentkezés</button>
            <button id="reg-btn" style="background:none; color:grey; border:none; margin-top:10px; cursor:pointer">Regisztráció</button>
        </div>
    </div>

    <div id="app-container" class="hidden">
        <header>
            <div style="font-weight:bold; font-size: 20px;">✨ CloudKeep <span style="color:var(--accent-color)">Pro</span></div>
            <div>
                <span id="user-mail" style="font-size: 12px; margin-right: 15px;"></span>
                <button onclick="logout()" class="btn" style="background:#3c4043; color:white; font-size:12px;">Kilépés</button>
            </div>
        </header>

        <div class="container">
            <div class="note-creator">
                <div class="type-selector">
                    <button class="type-btn active" onclick="setCreatorType('text', this)">Szöveg</button>
                    <button class="type-btn" onclick="setCreatorType('checklist', this)">Checklist</button>
                    <button class="type-btn" onclick="setCreatorType('money', this)">Pénzügy</button>
                </div>
                <input type="text" id="new-title" placeholder="Cím..." style="background:transparent; border:none; font-size:18px; font-weight:bold; color:white; width:100%; outline:none;">
                
                <div id="creator-content-area" style="margin-top:15px;">
                    <div id="text-creator" class="rich-editor" contenteditable="true" style="color:white;" placeholder="Írj valamit..."></div>
                    
                    <div id="list-creator" class="hidden">
                        <div id="list-items-container"></div>
                        <button onclick="addListItem('list-items-container')" class="btn" style="background:none; color:var(--accent-color); font-size:12px;">+ Új sor</button>
                    </div>
                </div>

                <div style="text-align:right; margin-top:15px;">
                    <button id="save-note" class="btn btn-primary">Mentés</button>
                </div>
            </div>

            <div class="notes-grid" id="notes-grid"></div>
        </div>
    </div>

    <div class="modal-overlay" id="note-modal">
        <div class="modal-content" id="modal-container">
            <div class="modal-header">
                <h2 id="modal-title" style="margin:0;"></h2>
                <span class="close-modal" onclick="closeModal()">×</span>
            </div>
            
            <div id="modal-body">
                <div class="toolbar" id="modal-toolbar">
                    <button onclick="document.execCommand('bold')"><b>B</b></button>
                    <button onclick="document.execCommand('underline')"><u>U</u></button>
                    <input type="color" onchange="document.execCommand('foreColor', false, this.value)">
                </div>

                <div id="modal-content-display" class="rich-editor"></div>
            </div>

            <div class="modal-footer" style="margin-top:20px; display:flex; justify-content: space-between; align-items:center;">
                <div id="modal-actions">
                    <button id="edit-btn" class="btn btn-primary read-only" onclick="enableEditMode()">Szerkesztés</button>
                    <button id="save-edit-btn" class="btn btn-save edit-only" onclick="saveEdit()">Változtatások mentése</button>
                </div>
                <button onclick="deleteCurrentNote()" class="btn" style="background:none; color:#d93025;">Törlés</button>
            </div>

            <div class="history-section" id="modal-history">
                <b>Előzmények:</b>
                <div id="history-list"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, query, where, arrayUnion, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB6Z9C3NiC491lYPYPctMejW-z77hm7YLM",
            authDomain: "notes-674e0.firebaseapp.com",
            projectId: "notes-674e0",
            storageBucket: "notes-674e0.firebasestorage.app",
            messagingSenderId: "696594467601",
            appId: "1:696594467601:web:4a3657ae12079e1a249ab0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let user = null;
        let creatorType = 'text';
        let currentNoteId = null;
        let allNotes = [];

        // --- AUTH ---
        window.logout = () => signOut(auth);
        document.getElementById('login-btn').onclick = () => {
            signInWithEmailAndPassword(auth, document.getElementById('email-input').value, document.getElementById('password-input').value).catch(err => alert(err.message));
        };
        document.getElementById('reg-btn').onclick = () => {
            createUserWithEmailAndPassword(auth, document.getElementById('email-input').value, document.getElementById('password-input').value).then(() => setDoc(doc(db, "users", auth.currentUser.email), {friends:[]}));
        };

        onAuthStateChanged(auth, u => {
            user = u;
            if(u){
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                document.getElementById('user-mail').innerText = u.email;
                initApp();
            } else {
                document.getElementById('auth-container').classList.remove('hidden');
                document.getElementById('app-container').classList.add('hidden');
            }
        });

        // --- TÍPUS KEZELÉS ---
        window.setCreatorType = (type, btn) => {
            creatorType = type;
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            document.getElementById('text-creator').classList.add('hidden');
            document.getElementById('list-creator').classList.add('hidden');
            
            if(type === 'text') document.getElementById('text-creator').classList.remove('hidden');
            else {
                document.getElementById('list-creator').classList.remove('hidden');
                document.getElementById('list-items-container').innerHTML = '';
                addListItem('list-items-container');
            }
        };

        window.addListItem = (containerId, val = '', checked = false, amount = 0) => {
            const div = document.createElement('div');
            div.className = 'list-item';
            if(creatorType === 'checklist' || (containerId === 'modal-content-display' && creatorType === 'checklist')){
                div.innerHTML = `<input type="checkbox" ${checked ? 'checked' : ''}> <input type="text" value="${val}" style="flex:1">`;
            } else {
                div.innerHTML = `<input type="number" value="${amount}" style="width:70px" class="m-amt"> <input type="text" value="${val}" style="flex:1" class="m-txt">`;
            }
            document.getElementById(containerId).appendChild(div);
        };

        // --- MENTÉS ---
        document.getElementById('save-note').onclick = async () => {
            const title = document.getElementById('new-title').value;
            let content = null;
            let items = [];

            if(creatorType === 'text') content = document.getElementById('text-creator').innerHTML;
            else {
                const rows = document.querySelectorAll('#list-items-container .list-item');
                rows.forEach(row => {
                    if(creatorType === 'checklist') items.push({ text: row.querySelector('input[type="text"]').value, checked: row.querySelector('input[type="checkbox"]').checked });
                    else items.push({ text: row.querySelector('.m-txt').value, amount: parseFloat(row.querySelector('.m-amt').value) || 0 });
                });
            }

            const noteData = {
                title, type: creatorType, content, items,
                owner: user.email, sharedWith: [], pendingUsers: [],
                createdAt: Date.now(),
                history: [{ user: user.email, time: Date.now(), action: 'Létrehozva' }]
            };

            await addDoc(collection(db, "notes"), noteData);
            resetCreator();
        };

        function resetCreator(){
            document.getElementById('new-title').value = '';
            document.getElementById('text-creator').innerHTML = '';
            document.getElementById('list-items-container').innerHTML = '';
            addListItem('list-items-container');
        }

        // --- LISTENING & RENDERING ---
        function initApp() {
            const q = query(collection(db, "notes"), where("owner", "==", user.email));
            onSnapshot(q, snap => {
                const grid = document.getElementById('notes-grid');
                grid.innerHTML = '';
                allNotes = [];
                snap.forEach(d => {
                    const note = {id: d.id, ...d.data()};
                    allNotes.push(note);
                    const card = document.createElement('div');
                    card.className = 'note-card';
                    card.onclick = () => openNote(note.id);
                    
                    let preview = "";
                    if(note.type === 'text') preview = note.content.substring(0, 50) + "...";
                    else if(note.type === 'checklist') preview = `📝 Checklist (${note.items.length} elem)`;
                    else preview = `💰 Pénzügy (Össz: ${note.items.reduce((acc, curr) => acc + curr.amount, 0)})`;

                    card.innerHTML = `<h3>${note.title || 'Névtelen'}</h3><div style="font-size:0.9rem; opacity:0.8;">${preview}</div>`;
                    grid.appendChild(card);
                });
            });
        }

        // --- MODAL LOGIC ---
        window.openNote = (id) => {
            currentNoteId = id;
            const note = allNotes.find(n => n.id === id);
            creatorType = note.type; // Modálisban is követjük a típust
            
            document.getElementById('note-modal').style.display = 'flex';
            document.getElementById('modal-container').classList.remove('edit-mode');
            document.getElementById('modal-container').classList.add('view-mode');
            
            document.getElementById('modal-title').innerText = note.title;
            const body = document.getElementById('modal-content-display');
            body.innerHTML = '';

            if(note.type === 'text') {
                body.innerHTML = note.content;
                body.contentEditable = false;
            } else {
                body.contentEditable = false;
                renderListInModal(note);
            }

            // History render
            const hList = document.getElementById('history-list');
            hList.innerHTML = note.history.slice().reverse().map(h => `
                <div class="history-item"><b>${new Date(h.time).toLocaleString('hu-HU')}</b> - ${h.user.split('@')[0]}: ${h.action}</div>
            `).join('');
        };

        function renderListInModal(note) {
            const body = document.getElementById('modal-content-display');
            let total = 0;
            note.items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'list-item';
                if(note.type === 'checklist') {
                    div.innerHTML = `<input type="checkbox" ${item.checked ? 'checked' : ''} disabled> <span>${item.text}</span>`;
                } else {
                    total += item.amount;
                    div.innerHTML = `<b>${item.amount}</b> <span>${item.text}</span>`;
                }
                body.appendChild(div);
            });
            if(note.type === 'money') {
                const tDiv = document.createElement('div');
                tDiv.className = 'money-total';
                tDiv.innerHTML = `Összesen: ${total}`;
                body.appendChild(tDiv);
            }
        }

        window.enableEditMode = () => {
            const note = allNotes.find(n => n.id === currentNoteId);
            document.getElementById('modal-container').classList.remove('view-mode');
            document.getElementById('modal-container').classList.add('edit-mode');
            
            const body = document.getElementById('modal-content-display');
            if(note.type === 'text') body.contentEditable = true;
            else {
                body.innerHTML = '';
                note.items.forEach(item => addListItem('modal-content-display', item.text, item.checked, item.amount));
                const addBtn = document.createElement('button');
                addBtn.innerText = "+ Új sor";
                addBtn.className = "btn edit-only";
                addBtn.onclick = () => addListItem('modal-content-display');
                body.appendChild(addBtn);
            }
        };

        window.saveEdit = async () => {
            const noteRef = doc(db, "notes", currentNoteId);
            const body = document.getElementById('modal-content-display');
            let updateData = { 
                history: arrayUnion({ user: user.email, time: Date.now(), action: 'Szerkesztve' }) 
            };

            if(creatorType === 'text') {
                updateData.content = body.innerHTML;
            } else {
                let items = [];
                const rows = body.querySelectorAll('.list-item');
                rows.forEach(row => {
                    if(creatorType === 'checklist') items.push({ text: row.querySelector('input[type="text"]').value, checked: row.querySelector('input[type="checkbox"]').checked });
                    else items.push({ text: row.querySelector('.m-txt').value, amount: parseFloat(row.querySelector('.m-amt').value) || 0 });
                });
                updateData.items = items;
            }

            await updateDoc(noteRef, updateData);
            closeModal();
        };

        window.closeModal = () => {
            document.getElementById('note-modal').style.display = 'none';
            currentNoteId = null;
        };

        window.deleteCurrentNote = async () => {
            if(confirm("Biztosan törlöd?")) {
                await deleteDoc(doc(db, "notes", currentNoteId));
                closeModal();
            }
        };

    </script>
</body>
</html>
