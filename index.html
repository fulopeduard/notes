<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Dark Notes - Firebase</title>
    <style>
        :root {
            /* Elegáns sötét gradient háttérhez tartozó színek */
            --surface-color: rgba(30, 30, 34, 0.85); /* Üveges hatás */
            --card-bg: #4a421b; /* Sötét módhoz illő elegáns sárga */
            --text-main: #f1f3f4;
            --text-muted: #bdc1c6;
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-color: #8ab4f8;
            --warning-color: #fbbc04;
            --danger-color: #f28b82;
            --success-color: #81c995;
            --btn-bg: #3c4043;
        }

        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            /* Modern, mély sötét gradient háttér */
            background: linear-gradient(145deg, #0d1117 0%, #161b22 50%, #0a0c10 100%);
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            color: var(--text-main);
            min-height: 100vh;
        }

        /* --- Auth & Layout --- */
        #auth-container, #app-container { transition: opacity 0.3s; }
        #auth-container { display: flex; justify-content: center; align-items: center; height: 100vh; }

        .auth-card {
            background: var(--surface-color); padding: 40px; border-radius: 16px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.6); width: 100%; max-width: 380px; 
            text-align: center; backdrop-filter: blur(10px); border: 1px solid var(--border-color);
        }

        input, textarea, .rich-editor {
            background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); color: white;
            padding: 12px; border-radius: 8px; margin-bottom: 15px; width: 100%; box-sizing: border-box;
            font-family: inherit; font-size: 14px; outline: none;
        }
        
        .rich-editor:focus { border-color: var(--accent-color); }
        
        /* Placeholder trükk a formázható div-hez */
        .rich-editor[contenteditable]:empty::before {
            content: attr(placeholder); color: #757a80; cursor: text;
        }

        button { cursor: pointer; border-radius: 8px; font-weight: 600; transition: 0.2s; border: none; }
        
        .primary-btn { background: var(--accent-color); color: #000; padding: 12px; width: 100%; }
        .primary-btn:hover { background: #aecbfa; box-shadow: 0 0 10px rgba(138, 180, 248, 0.4); }

        /* --- App Header & Notifications --- */
        header {
            background: var(--surface-color); padding: 15px 30px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100;
            backdrop-filter: blur(10px);
        }

        .notification-area { max-width: 600px; margin: 20px auto; }
        .invite-card {
            background: rgba(60, 64, 67, 0.9); padding: 15px; border-radius: 8px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center; 
            border-left: 4px solid var(--warning-color); border-right: 1px solid var(--border-color);
        }
        .invite-btns button { padding: 6px 12px; margin-left: 5px; font-size: 12px; }

        /* --- Notes Grid & Toolbar --- */
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }

        .note-creator {
            background: var(--surface-color); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 20px; max-width: 500px; margin: 0 auto 30px auto;
            backdrop-filter: blur(10px); box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        .toolbar {
            display: flex; gap: 8px; margin-bottom: 12px; padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }
        .toolbar button {
            background: var(--btn-bg); color: var(--text-main); padding: 6px 12px; 
            font-size: 14px; border: 1px solid var(--border-color);
        }
        .toolbar button:hover { background: #525659; }
        .toolbar input[type="color"] {
            padding: 0; width: 32px; height: 32px; border: none; cursor: pointer;
            background: transparent; margin-bottom: 0; border-radius: 4px; overflow: hidden;
        }

        .notes-grid { column-count: 3; column-gap: 15px; }
        @media (max-width: 800px) { .notes-grid { column-count: 2; } }
        @media (max-width: 500px) { .notes-grid { column-count: 1; } }

        .note-card {
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 10px; padding: 18px; margin-bottom: 15px; break-inside: avoid;
            position: relative; transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .note-card:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 8px 16px rgba(0,0,0,0.5); 
        }

        .note-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; outline: none; }
        .note-content { font-size: 0.95rem; line-height: 1.5; outline: none; word-wrap: break-word; }

        .card-actions {
            margin-top: 15px; display: flex; gap: 10px; 
            border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px;
        }

        .icon-btn { background: none; color: var(--text-muted); font-size: 16px; padding: 5px; }
        .icon-btn:hover { color: #fff; }

        .badge {
            font-size: 11px; background: rgba(0,0,0,0.3); padding: 3px 8px; 
            border-radius: 12px; color: rgba(255,255,255,0.8); display: inline-block; margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div id="auth-container">
        <div class="auth-card">
            <h2 style="color: var(--accent-color); margin-top:0;">✨ CloudKeep</h2>
            <p id="auth-error" style="color: var(--danger-color); display:none; font-size: 13px;"></p>
            <input type="email" id="email-input" placeholder="Email cím">
            <input type="password" id="password-input" placeholder="Jelszó (min. 6 karakter)">
            <button class="primary-btn" id="login-btn">Bejelentkezés</button>
            <button style="background:none; color: var(--text-muted); margin-top:10px" id="reg-btn">Regisztráció</button>
        </div>
    </div>

    <div id="app-container" style="display:none">
        <header>
            <div style="font-weight:bold; font-size: 22px; text-shadow: 0 2px 4px rgba(0,0,0,0.3);">
                ✨ <span style="color:var(--accent-color)">Cloud</span>Keep
            </div>
            <div style="display:flex; align-items:center; gap:15px">
                <span id="user-mail" style="font-size: 14px; color: var(--text-muted)"></span>
                <button onclick="logout()" class="icon-btn" title="Kijelentkezés" style="border:1px solid var(--border-color); border-radius:6px; padding:6px 12px;">Kijelentkezés</button>
            </div>
        </header>

        <div class="container">
            <div id="invites-container" class="notification-area"></div>

            <div class="note-creator">
                <div class="toolbar">
                    <button type="button" onclick="document.execCommand('bold', false, null)" title="Félkövér"><b>B</b></button>
                    <button type="button" onclick="document.execCommand('underline', false, null)" title="Aláhúzott"><u>U</u></button>
                    <input type="color" onchange="document.execCommand('foreColor', false, this.value)" title="Szövegszín" value="#ffffff">
                </div>
                
                <input type="text" id="new-title" placeholder="Jegyzet címe..." style="background:transparent; border:none; padding:0 5px; font-weight:bold; font-size: 18px;">
                <div id="new-content" class="rich-editor" contenteditable="true" placeholder="Írj valamit... (Kijelölve színezheted, formázhatod)" style="background:transparent; border:none; padding:5px; margin-top:10px; min-height: 60px;"></div>
                
                <div style="text-align:right; margin-top: 15px;">
                    <button id="save-note" class="primary-btn" style="width:auto; padding: 8px 24px; border-radius: 20px;">Mentés</button>
                </div>
            </div>

            <div class="notes-grid" id="notes-grid"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, query, where, arrayUnion, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB6Z9C3NiC491lYPYPctMejW-z77hm7YLM",
            authDomain: "notes-674e0.firebaseapp.com",
            projectId: "notes-674e0",
            storageBucket: "notes-674e0.firebasestorage.app",
            messagingSenderId: "696594467601",
            appId: "1:696594467601:web:4a3657ae12079e1a249ab0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let user = null;
        let unsubscribeSajat = null;
        let unsubscribeMegosztott = null;

        // Két külön Map az azonnali UI frissítéshez (ez javítja a törlési hibát!)
        let myNotesMap = new Map();
        let sharedNotesMap = new Map();

        // --- AUTH ---
        window.logout = () => signOut(auth);

        document.getElementById('login-btn').onclick = () => {
            signInWithEmailAndPassword(auth, document.getElementById('email-input').value, document.getElementById('password-input').value)
                .catch(err => alert("Hiba: " + err.message));
        };

        document.getElementById('reg-btn').onclick = () => {
            const email = document.getElementById('email-input').value;
            if(document.getElementById('password-input').value.length < 6) return alert("Min 6 karakter!");
            createUserWithEmailAndPassword(auth, email, document.getElementById('password-input').value)
                .then(async () => {
                    await setDoc(doc(db, "users", email), { friends: [] });
                })
                .catch(err => alert("Hiba: " + err.message));
        };

        onAuthStateChanged(auth, u => {
            user = u;
            if (u) {
                document.getElementById('auth-container').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
                document.getElementById('user-mail').innerText = u.email;
                initApp();
            } else {
                document.getElementById('auth-container').style.display = 'flex';
                document.getElementById('app-container').style.display = 'none';
                if(unsubscribeSajat) unsubscribeSajat();
                if(unsubscribeMegosztott) unsubscribeMegosztott();
            }
        });

        // --- CORE LOGIC ---
        function initApp() {
            listenNotes();
            listenInvites();
        }

        // Jegyzet mentése (Most már HTML-t ment a színek/félkövér miatt)
        document.getElementById('save-note').onclick = async () => {
            const title = document.getElementById('new-title').value;
            const content = document.getElementById('new-content').innerHTML; // innerText helyett innerHTML
            
            if(!title && (!content || content === '<br>')) return;

            await addDoc(collection(db, "notes"), {
                title, content,
                owner: user.email,
                sharedWith: [],
                pendingUsers: [],
                createdAt: Date.now()
            });
            
            document.getElementById('new-title').value = '';
            document.getElementById('new-content').innerHTML = '';
        };

        // Jegyzetek figyelése (A TÖRLÉSI HIBA JAVÍTÁSA)
        function listenNotes() {
            const qSaját = query(collection(db, "notes"), where("owner", "==", user.email));
            const qMegosztott = query(collection(db, "notes"), where("sharedWith", "array-contains", user.email));

            // Amikor frissül a DB, TÖRLÜK az eddigi listát, és újra feltöltjük a pillanatnyi állapottal.
            // Így a letörölt jegyzetek garantáltan eltűnnek egyből.
            unsubscribeSajat = onSnapshot(qSaját, snap => {
                myNotesMap.clear();
                snap.forEach(d => myNotesMap.set(d.id, {id: d.id, ...d.data()}));
                renderAllNotes();
            });

            unsubscribeMegosztott = onSnapshot(qMegosztott, snap => {
                sharedNotesMap.clear();
                snap.forEach(d => sharedNotesMap.set(d.id, {id: d.id, ...d.data()}));
                renderAllNotes();
            });
        }

        // Kártyák kirajzolása
        function renderAllNotes() {
            const grid = document.getElementById('notes-grid');
            grid.innerHTML = '';
            
            // Összefűzzük a saját és a megosztott jegyzeteket
            const combined = [...myNotesMap.values(), ...sharedNotesMap.values()]
                .sort((a,b) => b.createdAt - a.createdAt);
            
            combined.forEach(note => {
                const card = document.createElement('div');
                card.className = 'note-card';
                card.innerHTML = `
                    <div class="badge">${note.owner === user.email ? 'Saját' : '👥 Megosztva tőle: ' + note.owner.split('@')[0]}</div>
                    <div class="note-title" contenteditable="true" onblur="updateNote('${note.id}', 'title', this.innerText)">${note.title}</div>
                    
                    <div class="note-content" contenteditable="true" onblur="updateNote('${note.id}', 'content', this.innerHTML)">${note.content}</div>
                    
                    <div class="card-actions">
                        <button class="icon-btn" onclick="shareNote('${note.id}')" title="Megosztás másokkal">👤+</button>
                        <button class="icon-btn" onclick="deleteNote('${note.id}')" title="Jegyzet Törlése" style="color: var(--danger-color)">🗑️</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // --- TÖBBI FUNKCIÓ (Változatlan) ---
        window.shareNote = async (noteId) => {
            const targetEmail = prompt("Kivel szeretnéd megosztani? (Email cím)");
            if (!targetEmail || targetEmail === user.email) return;

            const targetRef = doc(db, "users", targetEmail);
            const targetSnap = await getDoc(targetRef);
            
            if (targetSnap.exists() && targetSnap.data().friends.includes(user.email)) {
                await updateDoc(doc(db, "notes", noteId), { sharedWith: arrayUnion(targetEmail) });
                alert("Sikeresen megosztva!");
            } else {
                await updateDoc(doc(db, "notes", noteId), { pendingUsers: arrayUnion(targetEmail) });
                alert("Megosztási kérelem elküldve!");
            }
        };

        function listenInvites() {
            const q = query(collection(db, "notes"), where("pendingUsers", "array-contains", user.email));
            onSnapshot(q, snap => {
                const container = document.getElementById('invites-container');
                container.innerHTML = '';
                snap.forEach(d => {
                    const data = d.data();
                    const div = document.createElement('div');
                    div.className = 'invite-card';
                    div.innerHTML = `
                        <span><b>${data.owner}</b> megosztott veled egy jegyzetet.</span>
                        <div class="invite-btns">
                            <button onclick="acceptInvite('${d.id}', '${data.owner}', true)" style="background:var(--success-color); color:#000">Barátként Ment + Elfogad</button>
                            <button onclick="acceptInvite('${d.id}', '${data.owner}', false)" style="background:var(--accent-color); color:#000">Csak Elfogad</button>
                            <button onclick="declineInvite('${d.id}')" style="background:var(--danger-color); color:#000">Elutasít</button>
                        </div>
                    `;
                    container.appendChild(div);
                });
            });
        }

        window.acceptInvite = async (noteId, ownerEmail, makeFriend) => {
            const noteRef = doc(db, "notes", noteId);
            const noteSnap = await getDoc(noteRef);
            const data = noteSnap.data();
            const newPending = data.pendingUsers.filter(e => e !== user.email);
            
            await updateDoc(noteRef, { pendingUsers: newPending, sharedWith: arrayUnion(user.email) });
            if (makeFriend) await updateDoc(doc(db, "users", user.email), { friends: arrayUnion(ownerEmail) });
        };

        window.declineInvite = async (noteId) => {
            const noteRef = doc(db, "notes", noteId);
            const noteSnap = await getDoc(noteRef);
            const newPending = noteSnap.data().pendingUsers.filter(e => e !== user.email);
            await updateDoc(noteRef, { pendingUsers: newPending });
        };

        window.updateNote = async (id, field, val) => {
            await updateDoc(doc(db, "notes", id), { [field]: val });
        };

        window.deleteNote = async (id) => {
            if(confirm("Biztosan törlöd ezt a jegyzetet?")) {
                await deleteDoc(doc(db, "notes", id));
            }
        };
    </script>
</body>
</html>
