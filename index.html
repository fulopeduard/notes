<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudKeep Pro - Firebase</title>
    <style>
        :root {
            --surface-color: rgba(30, 30, 34, 0.95);
            --card-bg: #d3b212;
            --text-main: #f1f3f4;
            --text-dark: #202124;
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-color: #8ab4f8;
            --danger-color: #f28b82;
            --success-color: #81c995;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(145deg, #0d1117 0%, #161b22 100%);
            background-attachment: fixed;
            margin: 0; color: var(--text-main); min-height: 100vh;
        }

        header {
            background: var(--surface-color); padding: 15px 30px;
            display: flex; align-items: center; justify-content: space-between;
            backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color);
            position: sticky; top: 0; z-index: 100;
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }

        .note-creator {
            background: var(--surface-color); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 20px; max-width: 550px; margin: 0 auto 30px auto;
        }

        .type-selector { display: flex; gap: 10px; margin-bottom: 15px; }
        .type-btn { 
            background: #3c4043; color: white; padding: 5px 12px; 
            border-radius: 6px; font-size: 12px; opacity: 0.6; border: none; cursor: pointer;
        }
        .type-btn.active { opacity: 1; border: 1px solid var(--accent-color); }

        .notes-grid { column-count: 3; column-gap: 15px; }
        @media (max-width: 800px) { .notes-grid { column-count: 2; } }
        @media (max-width: 500px) { .notes-grid { column-count: 1; } }

        .note-card {
            background: var(--card-bg); color: var(--text-dark);
            border-radius: 10px; padding: 18px; margin-bottom: 15px;
            break-inside: avoid; cursor: pointer; transition: transform 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .note-card:hover { transform: translateY(-3px); box-shadow: 0 8px 16px rgba(0,0,0,0.5); }
        .note-card h3 { margin: 0 0 10px 0; font-size: 1.1rem; line-height: 1.3;}
        
        .badge {
            font-size: 10px; background: rgba(0,0,0,0.1); padding: 3px 8px; 
            border-radius: 8px; color: #202124; margin-bottom: 10px; display: inline-block; font-weight: bold;
        }

        /* Megnövelt előnézeti terület stílusa */
        .preview-content {
            font-size: 0.95rem; opacity: 0.85; line-height: 1.5;
            display: -webkit-box; -webkit-line-clamp: 6; /* Max 6 sor */
            -webkit-box-orient: vertical; overflow: hidden;
        }
        .preview-list-item { margin-bottom: 4px; display: flex; gap: 6px; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; justify-content: center;
            align-items: center; z-index: 1000; backdrop-filter: blur(5px);
        }

        .modal-content {
            background: var(--card-bg); color: var(--text-dark);
            width: 90%; max-width: 700px; max-height: 90vh;
            border-radius: 15px; padding: 25px; overflow-y: auto; position: relative;
            display: flex; flex-direction: column;
        }

        .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .close-modal { font-size: 28px; cursor: pointer; font-weight: bold; }
        .close-modal:hover { color: #555; }

        .rich-editor { min-height: 80px; outline: none; margin-bottom: 15px; line-height: 1.6; }
        .list-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .list-item input[type="text"], .list-item input[type="number"] {
            background: rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.2);
            padding: 8px; border-radius: 4px; color: var(--text-dark); font-family: inherit;
        }
        .money-total { border-top: 2px solid rgba(0,0,0,0.2); margin-top: 15px; padding-top: 10px; font-weight: bold; font-size: 1.2rem; }

        .history-section { margin-top: 30px; padding-top: 15px; border-top: 1px dashed rgba(0,0,0,0.3); font-size: 0.85rem; }
        .history-item { 
            margin-bottom: 8px; color: #333; cursor: pointer; 
            padding: 5px; border-radius: 4px; transition: background 0.2s;
        }
        .history-item:hover { background: rgba(0,0,0,0.05); }

        .btn { padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; border: none; transition: 0.2s;}
        .btn-primary { background: var(--accent-color); color: #000; }
        .btn-primary:hover { filter: brightness(1.1); }
        .btn-save { background: #188038; color: white; margin-top: 10px; }
        .btn-save:hover { background: #13652c; }
        
        .toolbar { display: flex; gap: 5px; margin-bottom: 10px; border-bottom: 1px solid rgba(0,0,0,0.2); padding-bottom: 10px; }
        .toolbar button { background: rgba(0,0,0,0.1); border:none; padding:5px 10px; border-radius:4px; cursor:pointer;}
        .toolbar button:hover { background: rgba(0,0,0,0.2); }
        .toolbar input[type="color"] { border:none; width: 30px; height: 30px; padding: 0; background: transparent; cursor: pointer; border-radius: 4px; }
        
        .modal-content.view-mode #modal-toolbar { display: none; }
        .modal-content.edit-mode #modal-toolbar { display: flex; }
        
        .edit-mode .read-only { display: none; }
        .view-mode .edit-only { display: none; }

        .hidden { display: none !important; }

        /* Időgép banner */
        #history-banner {
            background: #fbbc04; color: #000; padding: 10px; border-radius: 8px;
            margin-bottom: 15px; font-weight: bold; display: flex; justify-content: space-between; align-items: center;
        }
    </style>
</head>
<body>

    <div id="auth-container" class="container" style="display: flex; justify-content: center; align-items: center; height: 100vh;">
        <div style="background: var(--surface-color); padding: 40px; border-radius: 15px; text-align: center; border: 1px solid var(--border-color); width: 100%; max-width: 380px;">
            <h2 style="color: var(--accent-color)">✨ CloudKeep Pro</h2>
            <input type="email" id="email-input" placeholder="Email cím" style="width:100%; padding:12px; margin-bottom:10px; border-radius:5px; border:none; background: rgba(255,255,255,0.1); color:white; box-sizing:border-box;">
            <input type="password" id="password-input" placeholder="Jelszó (min 6 kar.)" style="width:100%; padding:12px; margin-bottom:20px; border-radius:5px; border:none; background: rgba(255,255,255,0.1); color:white; box-sizing:border-box;">
            <button class="btn btn-primary" id="login-btn" style="width:100%">Bejelentkezés</button>
            <button id="reg-btn" style="background:none; color:var(--text-muted); border:none; margin-top:15px; cursor:pointer">Regisztráció</button>
        </div>
    </div>

    <div id="app-container" class="hidden">
        <header>
            <div style="font-weight:bold; font-size: 22px;">✨ CloudKeep <span style="color:var(--accent-color)">Pro</span></div>
            <div>
                <span id="user-mail" style="font-size: 13px; margin-right: 15px;"></span>
                <button onclick="logout()" class="btn" style="background:#3c4043; color:white; font-size:12px;">Kijelentkezés</button>
            </div>
        </header>

        <div class="container">
            <div class="note-creator">
                <div class="type-selector">
                    <button class="type-btn active" onclick="setCreatorType('text', this)">Szöveg</button>
                    <button class="type-btn" onclick="setCreatorType('checklist', this)">Checklist</button>
                    <button class="type-btn" onclick="setCreatorType('money', this)">Pénzügy</button>
                </div>
                
                <div class="toolbar" id="creator-toolbar" style="border-bottom-color: rgba(255,255,255,0.1);">
                    <button onclick="document.execCommand('bold')" style="color:white; background:rgba(255,255,255,0.1)"><b>Félkövér</b></button>
                    <button onclick="document.execCommand('underline')" style="color:white; background:rgba(255,255,255,0.1)"><u>Aláhúzott</u></button>
                    <input type="color" onchange="document.execCommand('foreColor', false, this.value)" value="#ffffff" title="Szöveg Színe">
                </div>

                <input type="text" id="new-title" placeholder="Jegyzet címe..." style="background:transparent; border:none; font-size:18px; font-weight:bold; color:white; width:100%; outline:none;">
                
                <div id="creator-content-area" style="margin-top:15px;">
                    <div id="text-creator" class="rich-editor" contenteditable="true" style="color:white; background:rgba(0,0,0,0.2); padding:10px; border-radius:8px;" placeholder="Írj valamit..."></div>
                    
                    <div id="list-creator" class="hidden" style="background:rgba(255,255,255,0.9); padding:10px; border-radius:8px;">
                        <div id="list-items-container"></div>
                        <button onclick="addListItem('list-items-container', 'creator')" class="btn" style="background:none; color:#1a73e8; font-size:13px; margin-top:10px;">+ Új sor hozzáadása</button>
                    </div>
                </div>

                <div style="text-align:right; margin-top:15px;">
                    <button id="save-note" class="btn btn-primary">Mentés</button>
                </div>
            </div>

            <div class="notes-grid" id="notes-grid"></div>
        </div>
    </div>

    <div class="modal-overlay" id="note-modal">
        <div class="modal-content view-mode" id="modal-container">
            <div id="history-banner" class="hidden">
                <span>🕒 Múltbeli állapotot nézel!</span>
                <button class="btn" onclick="restoreLiveView()" style="background:#000; color:#fff; padding: 5px 10px; font-size: 12px;">Vissza a jelenbe</button>
            </div>

            <div class="modal-header">
                <h2 id="modal-title" style="margin:0; outline:none; flex:1;"></h2>
                <span class="close-modal" onclick="closeModal()">×</span>
            </div>
            
            <div id="modal-body">
                <div class="toolbar" id="modal-toolbar">
                    <button onclick="document.execCommand('bold')"><b>Félkövér</b></button>
                    <button onclick="document.execCommand('underline')"><u>Aláhúzott</u></button>
                    <input type="color" onchange="document.execCommand('foreColor', false, this.value)" value="#202124" title="Szöveg Színe">
                </div>

                <div id="modal-content-display" class="rich-editor"></div>
            </div>

            <div class="modal-footer" style="margin-top:20px; display:flex; justify-content: space-between; align-items:center;">
                <div id="modal-actions">
                    <button id="edit-btn" class="btn btn-primary read-only" onclick="enableEditMode()">Szerkesztés</button>
                    <button id="save-edit-btn" class="btn btn-save edit-only" onclick="saveEdit()">Változtatások mentése</button>
                </div>
                <button id="delete-btn" onclick="deleteCurrentNote()" class="btn" style="background:rgba(217, 48, 37, 0.1); color:#d93025;">Törlés</button>
            </div>

            <div class="history-section" id="modal-history">
                <b>Előzmények (kattints egyre az időgéphez):</b>
                <div id="history-list"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, query, where, arrayUnion, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB6Z9C3NiC491lYPYPctMejW-z77hm7YLM",
            authDomain: "notes-674e0.firebaseapp.com",
            projectId: "notes-674e0",
            storageBucket: "notes-674e0.firebasestorage.app",
            messagingSenderId: "696594467601",
            appId: "1:696594467601:web:4a3657ae12079e1a249ab0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let user = null;
        let creatorType = 'text';       
        let currentModalType = 'text';  
        let currentNoteId = null;
        
        let myNotesMap = new Map();
        let sharedNotesMap = new Map();

        // --- AUTH ---
        window.logout = () => signOut(auth);
        
        document.getElementById('login-btn').onclick = () => {
            signInWithEmailAndPassword(auth, document.getElementById('email-input').value, document.getElementById('password-input').value)
            .catch(err => alert("Hibás email vagy jelszó."));
        };

        document.getElementById('reg-btn').onclick = () => {
            const email = document.getElementById('email-input').value;
            const pw = document.getElementById('password-input').value;
            if(pw.length < 6) return alert("A jelszó min. 6 karakter kell legyen!");
            
            createUserWithEmailAndPassword(auth, email, pw)
            .then((cred) => {
                setDoc(doc(db, "users", cred.user.email), {friends:[]});
            }).catch(err => alert("Regisztrációs hiba: " + err.message));
        };

        onAuthStateChanged(auth, u => {
            user = u;
            if(u){
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                document.getElementById('user-mail').innerText = u.email;
                initApp();
            } else {
                document.getElementById('auth-container').classList.remove('hidden');
                document.getElementById('app-container').classList.add('hidden');
            }
        });

        // --- TÍPUS KEZELÉS ---
        window.setCreatorType = (type, btn) => {
            creatorType = type;
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            document.getElementById('text-creator').classList.add('hidden');
            document.getElementById('list-creator').classList.add('hidden');
            document.getElementById('creator-toolbar').classList.add('hidden');
            
            if(type === 'text') {
                document.getElementById('text-creator').classList.remove('hidden');
                document.getElementById('creator-toolbar').classList.remove('hidden'); // Formázó sáv mutatása
            } else {
                document.getElementById('list-creator').classList.remove('hidden');
                document.getElementById('list-items-container').innerHTML = '';
                addListItem('list-items-container', 'creator');
            }
        };

        window.addListItem = (containerId, mode, val = '', checked = false, amount = '') => {
            const div = document.createElement('div');
            div.className = 'list-item';
            const activeType = (mode === 'creator') ? creatorType : currentModalType;

            if(activeType === 'checklist'){
                div.innerHTML = `<input type="checkbox" ${checked ? 'checked' : ''}> <input type="text" placeholder="Elem neve..." value="${val}" style="flex:1">`;
            } else if (activeType === 'money') {
                div.innerHTML = `<input type="number" placeholder="Összeg" value="${amount}" style="width:80px" class="m-amt"> <input type="text" placeholder="Leírás..." value="${val}" style="flex:1" class="m-txt">`;
            }
            
            const container = document.getElementById(containerId);
            const addBtn = container.querySelector('button');
            if(addBtn) container.insertBefore(div, addBtn);
            else container.appendChild(div);
        };

        // --- ÚJ JEGYZET MENTÉSE (Állapot mentéssel a historyba) ---
        document.getElementById('save-note').onclick = async () => {
            const title = document.getElementById('new-title').value;
            let content = "";
            let items = [];

            if(creatorType === 'text') {
                content = document.getElementById('text-creator').innerHTML;
                if(!title && (!content || content === '<br>')) return;
            } else {
                const rows = document.querySelectorAll('#list-items-container .list-item');
                rows.forEach(row => {
                    if(creatorType === 'checklist') {
                        const txt = row.querySelector('input[type="text"]').value;
                        if(txt) items.push({ text: txt, checked: row.querySelector('input[type="checkbox"]').checked });
                    } else {
                        const txt = row.querySelector('.m-txt').value;
                        const amt = parseFloat(row.querySelector('.m-amt').value) || 0;
                        if(txt || amt !== 0) items.push({ text: txt, amount: amt });
                    }
                });
                if(!title && items.length === 0) return;
            }

            // Snapshot mentése a történelemhez
            const snapshotState = { title: title, content: content, items: items };

            const noteData = {
                title: title, type: creatorType, content: content, items: items,
                owner: user.email, sharedWith: [], pendingUsers: [],
                createdAt: Date.now(),
                history: [{ user: user.email, time: Date.now(), action: 'Létrehozva', state: snapshotState }]
            };

            await addDoc(collection(db, "notes"), noteData);
            
            document.getElementById('new-title').value = '';
            document.getElementById('text-creator').innerHTML = '';
            document.getElementById('list-items-container').innerHTML = '';
            if(creatorType !== 'text') addListItem('list-items-container', 'creator');
        };

        // --- RENDERELÉS & ELŐNÉZET ---
        function initApp() {
            const qSaját = query(collection(db, "notes"), where("owner", "==", user.email));
            const qMegosztott = query(collection(db, "notes"), where("sharedWith", "array-contains", user.email));

            onSnapshot(qSaját, snap => {
                myNotesMap.clear();
                snap.forEach(d => myNotesMap.set(d.id, {id: d.id, ...d.data()}));
                renderAllNotes();
            });

            onSnapshot(qMegosztott, snap => {
                sharedNotesMap.clear();
                snap.forEach(d => sharedNotesMap.set(d.id, {id: d.id, ...d.data()}));
                renderAllNotes();
            });
        }

        function renderAllNotes() {
            const grid = document.getElementById('notes-grid');
            grid.innerHTML = '';
            
            const combined = [...myNotesMap.values(), ...sharedNotesMap.values()]
                .sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0));
            
            combined.forEach(note => {
                const safeType = note.type || 'text';
                const safeItems = note.items || [];
                
                const card = document.createElement('div');
                card.className = 'note-card';
                card.onclick = () => openNote(note.id);
                
                let previewHtml = "";
                
                // NAGYOBB ELŐNÉZET LOGIKÁJA
                if(safeType === 'text') {
                    // Leszedjük a HTML tageket, és 150 karaktert engedünk
                    const plainText = (note.content || "").replace(/<[^>]*>?/gm, '');
                    previewHtml = plainText.substring(0, 150) + (plainText.length > 150 ? "..." : "");
                }
                else if(safeType === 'checklist') {
                    // Első 3 elem mutatása
                    const itemsToShow = safeItems.slice(0, 3);
                    previewHtml = itemsToShow.map(i => `<div class="preview-list-item"><span>${i.checked ? '☑' : '☐'}</span> <span>${i.text}</span></div>`).join('');
                    if(safeItems.length > 3) previewHtml += `<div style="font-size: 0.8rem; margin-top:5px;">+ ${safeItems.length - 3} további elem...</div>`;
                }
                else {
                    // Pénzügy: Első 3 elem + összeg
                    const sum = safeItems.reduce((acc, curr) => acc + (curr.amount || 0), 0);
                    const itemsToShow = safeItems.slice(0, 3);
                    previewHtml = itemsToShow.map(i => `<div class="preview-list-item"><b style="width:50px">${i.amount}</b> <span>${i.text}</span></div>`).join('');
                    if(safeItems.length > 3) previewHtml += `<div style="font-size: 0.8rem; margin-top:5px;">+ további elemek...</div>`;
                    previewHtml += `<div style="margin-top: 8px; font-weight: bold; border-top:1px solid rgba(0,0,0,0.1); padding-top:5px;">Végösszeg: ${sum}</div>`;
                }

                const badgeHtml = note.owner === user.email ? '' : `<div class="badge">👥 Tőle: ${note.owner.split('@')[0]}</div>`;

                card.innerHTML = `
                    ${badgeHtml}
                    <h3>${note.title || 'Névtelen jegyzet'}</h3>
                    <div class="preview-content">${previewHtml}</div>
                `;
                grid.appendChild(card);
            });
        }

        // --- MODAL & IDŐGÉP LOGIKA ---
        window.openNote = (id) => {
            currentNoteId = id;
            document.getElementById('history-banner').classList.add('hidden');
            document.getElementById('modal-actions').classList.remove('hidden');
            document.getElementById('delete-btn').classList.remove('hidden');
            
            const note = myNotesMap.get(id) || sharedNotesMap.get(id);
            renderModalState(note.title, note.type, note.content, note.items, note.history);
            
            const modal = document.getElementById('note-modal');
            const container = document.getElementById('modal-container');
            modal.style.display = 'flex';
            container.className = 'modal-content view-mode';
        };

        // Kiszervezett renderelő függvény, hogy a history-ból is tudjuk hívni
        function renderModalState(title, type, content, items, historyArr, isHistoryView = false) {
            currentModalType = type || 'text';
            const body = document.getElementById('modal-content-display');
            const titleEl = document.getElementById('modal-title');
            
            titleEl.innerText = title || '';
            titleEl.contentEditable = false;
            body.innerHTML = '';

            if(currentModalType === 'text') {
                body.innerHTML = content || '';
                body.contentEditable = false;
            } else {
                body.contentEditable = false;
                let total = 0;
                (items || []).forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'list-item';
                    if(currentModalType === 'checklist') {
                        div.innerHTML = `<input type="checkbox" ${item.checked ? 'checked' : ''} disabled> <span>${item.text}</span>`;
                    } else {
                        total += (item.amount || 0);
                        div.innerHTML = `<b style="width:80px; display:inline-block">${item.amount || 0}</b> <span>${item.text}</span>`;
                    }
                    body.appendChild(div);
                });
                if(currentModalType === 'money') {
                    const tDiv = document.createElement('div');
                    tDiv.className = 'money-total';
                    tDiv.innerHTML = `Összesen: ${total}`;
                    body.appendChild(tDiv);
                }
            }

            // Csak akkor frissítsük a history listát, ha nem a history nézetben vagyunk épp
            if(!isHistoryView) {
                const hList = document.getElementById('history-list');
                const historyData = historyArr || [];
                if(historyData.length > 0) {
                    // Az indexeket meg kell fordítani, mert a tömböt megfordítjuk vizuálisan
                    const totalLen = historyData.length;
                    hList.innerHTML = historyData.slice().reverse().map((h, i) => {
                        const originalIndex = totalLen - 1 - i;
                        return `<div class="history-item" onclick="viewHistoryState(${originalIndex})" title="Kattints az állapot megtekintéséhez">
                            <b>${new Date(h.time).toLocaleString('hu-HU')}</b> - ${(h.user || 'Ismeretlen').split('@')[0]}: ${h.action}
                        </div>`;
                    }).join('');
                } else {
                    hList.innerHTML = `<div class="history-item">Nincsenek elérhető előzmények.</div>`;
                }
            }
        }

        window.viewHistoryState = (historyIndex) => {
            const note = myNotesMap.get(currentNoteId) || sharedNotesMap.get(currentNoteId);
            const targetHistory = note.history[historyIndex];
            
            if(!targetHistory.state) {
                alert("Ehhez a régi verzióhoz az alkalmazás korábbi verziójában még nem került elmentésre a tartalom.");
                return;
            }

            // Nézet átváltása "Időgép" módba
            document.getElementById('modal-container').className = 'modal-content view-mode';
            document.getElementById('modal-actions').classList.add('hidden');
            document.getElementById('delete-btn').classList.add('hidden');
            document.getElementById('history-banner').classList.remove('hidden');

            renderModalState(
                targetHistory.state.title, 
                note.type, // Típus sosem változik
                targetHistory.state.content, 
                targetHistory.state.items, 
                null, 
                true
            );
        };

        window.restoreLiveView = () => {
            openNote(currentNoteId); // Újratölti a jelenlegi élő változatot
        };

        window.enableEditMode = () => {
            const note = myNotesMap.get(currentNoteId) || sharedNotesMap.get(currentNoteId);
            const container = document.getElementById('modal-container');
            container.classList.remove('view-mode');
            container.classList.add('edit-mode');
            
            document.getElementById('modal-title').contentEditable = true;
            document.getElementById('modal-title').focus();
            
            const body = document.getElementById('modal-content-display');
            
            if(currentModalType === 'text') {
                body.contentEditable = true;
            } else {
                body.innerHTML = '';
                (note.items || []).forEach(item => addListItem('modal-content-display', 'modal', item.text, item.checked, item.amount));
                
                const addBtn = document.createElement('button');
                addBtn.innerText = "+ Új sor hozzáadása";
                addBtn.className = "btn edit-only";
                addBtn.style.background = "rgba(0,0,0,0.1)";
                addBtn.style.color = "#000";
                addBtn.style.marginTop = "10px";
                addBtn.onclick = () => addListItem('modal-content-display', 'modal');
                body.appendChild(addBtn);
            }
        };

        window.saveEdit = async () => {
            const noteRef = doc(db, "notes", currentNoteId);
            const body = document.getElementById('modal-content-display');
            const title = document.getElementById('modal-title').innerText;
            
            let updateData = { title: title };
            let snapshotState = { title: title };

            if(currentModalType === 'text') {
                updateData.content = body.innerHTML;
                snapshotState.content = body.innerHTML;
            } else {
                let items = [];
                const rows = body.querySelectorAll('.list-item');
                rows.forEach(row => {
                    if(currentModalType === 'checklist') {
                        const txt = row.querySelector('input[type="text"]').value;
                        if(txt) items.push({ text: txt, checked: row.querySelector('input[type="checkbox"]').checked });
                    } else {
                        const txt = row.querySelector('.m-txt').value;
                        const amt = parseFloat(row.querySelector('.m-amt').value) || 0;
                        if(txt || amt !== 0) items.push({ text: txt, amount: amt });
                    }
                });
                updateData.items = items;
                snapshotState.items = items;
            }

            // Új snapshot hozzáadása a history-hoz
            updateData.history = arrayUnion({ 
                user: user.email, 
                time: Date.now(), 
                action: 'Szerkesztve',
                state: snapshotState
            });

            await updateDoc(noteRef, updateData);
            closeModal();
        };

        window.closeModal = () => {
            document.getElementById('note-modal').style.display = 'none';
            currentNoteId = null;
        };

        window.deleteCurrentNote = async () => {
            if(confirm("Biztosan véglegesen törlöd ezt a jegyzetet?")) {
                await deleteDoc(doc(db, "notes", currentNoteId));
                closeModal();
            }
        };
    </script>
</body>
</html>
